<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#0a0a0a;--card:#0d0d0d;--card-h:rgba(20,20,28,.98);
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
  --txt:#e8eaed;--txt2:#9aa0a6;--txt3:#5f6368;
  --primary:#3b82f6;--primary-d:#2563eb;--primary-l:#60a5fa;
  --secondary:#06b6d4;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --r:8px;--r-lg:12px;--r-xl:16px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --t:180ms cubic-bezier(.4,0,.2,1);
  /* Priority palette */
  --p1:#FF0000;--p2:#DD0000;--p3:#FF5500;--p4:#FF8800;--p5:#FFFF00;
  --p6:#A39600;--p7:#5555FF;--p8:#0000FF;--p9:#FF00FF;--p10:#AA00AA;
  --pc:#23CC72;
}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100%;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(59,130,246,.3);border-radius:3px}

/* ── Header ── */
.app-header{
  position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:10px;
  padding:.55rem 1rem;background:rgba(0,0,0,.93);
  backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.4);
}
.header-left{display:flex;align-items:center;gap:10px;flex-shrink:0}
.count-block{display:flex;align-items:baseline;gap:2px}
.patient-count{
  font-size:2.1rem;font-weight:800;line-height:1;
  background:linear-gradient(135deg,#60a5fa,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.count-label{font-size:.6rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em}
.brand-main{font-size:1rem;font-weight:700;color:var(--txt)}
.header-center{flex:1;min-width:0}
.search-wrapper{position:relative;max-width:400px;margin:0 auto}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;width:15px;height:15px}
.search-input{
  width:100%;padding:.4rem .4rem .4rem 2rem;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:var(--r-lg);color:var(--txt);font-size:.85rem;font-family:var(--sans);
  outline:none;transition:border-color var(--t),background var(--t);
}
.search-input:focus{border-color:var(--primary);background:rgba(59,130,246,.07)}
.search-input::placeholder{color:var(--txt3)}
.clear-search{
  position:absolute;right:7px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--txt3);cursor:pointer;font-size:.8rem;
  padding:2px 4px;display:none;
}
.clear-search:hover{color:var(--txt)}
.header-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.hdr-btn{
  display:flex;align-items:center;gap:5px;padding:.38rem .6rem;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:var(--r);color:var(--txt2);cursor:pointer;
  font-size:.78rem;font-weight:500;font-family:var(--sans);
  transition:background var(--t),color var(--t),border-color var(--t);white-space:nowrap;
}
.hdr-btn:hover{background:rgba(255,255,255,.12);color:var(--txt);border-color:var(--border2)}
.hdr-btn.active{background:rgba(59,130,246,.18);border-color:var(--primary);color:var(--primary-l)}
.hdr-btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.hdr-btn-primary:hover{background:var(--primary-d);border-color:var(--primary-d);color:#fff}
.btn-label{display:inline}

/* ── Status bar ── */
.status-bar{
  padding:.22rem 1rem;font-size:.73rem;color:var(--txt3);
  background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:space-between;
}
.filtered-msg{color:var(--primary-l)}

/* ── Main ── */
.main-content{padding:.75rem 1rem 4rem;max-width:1400px;margin:0 auto}

/* ── Loading / Empty ── */
.loading-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:5rem 1rem;color:var(--txt2);font-size:.9rem;
}
.spinner{
  width:34px;height:34px;border:3px solid rgba(59,130,246,.18);
  border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{
  flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:5rem 1rem;text-align:center;color:var(--txt2);
}
.empty-icon{font-size:3rem}
.empty-title{font-size:1.15rem;font-weight:600;color:var(--txt)}
.empty-sub{font-size:.85rem;max-width:300px;line-height:1.6}

/* ── Patient grid ── */
.patient-list{
  display:grid;gap:10px;
  grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
}
@media(max-width:680px){.patient-list{grid-template-columns:1fr}}

/* ── Patient card ── */
.patient-card{
  position:relative;background:var(--card);border:1px solid var(--border);
  border-left:4px solid #333;border-radius:var(--r-lg);overflow:hidden;
  cursor:pointer;display:flex;flex-direction:column;
  transition:background var(--t),box-shadow var(--t),transform var(--t);
}
.patient-card:hover{background:var(--card-h);box-shadow:var(--shadow);transform:translateY(-1px)}
.card-body{padding:.7rem .85rem .45rem;flex:1}

/* Name row */
.card-name-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.card-name{font-size:.95rem;font-weight:600;color:var(--txt);line-height:1.2;flex:1;word-break:break-word}
.card-priority-pill{
  font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:2px 6px;border-radius:4px;border:1px solid;white-space:nowrap;flex-shrink:0;
  background:rgba(0,0,0,.3);
}

/* Badges */
.badge-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.badge{
  display:inline-flex;align-items:center;gap:3px;padding:2px 7px;
  border-radius:4px;font-size:.68rem;font-weight:600;font-family:var(--mono);
  cursor:pointer;border:1px solid;
  transition:opacity var(--t),transform var(--t);white-space:nowrap;
}
.badge:hover{opacity:.75}
.badge:active{transform:scale(.95)}
.badge-rm{background:rgba(239,68,68,.13);border-color:rgba(239,68,68,.35);color:#fca5a5}
.badge-mrn{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35);color:#6ee7b7}
.badge-copy{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.3);color:#a5b4fc;font-size:.6rem}

/* Sub-info */
.card-ag-att{font-size:.73rem;color:var(--txt3);margin-bottom:4px}
.card-problems{font-size:.79rem;color:var(--txt2);margin-bottom:5px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-violin{
  font-family:var(--mono);font-size:.7rem;color:rgba(167,243,208,.75);
  background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.12);
  border-radius:5px;padding:4px 7px;margin-bottom:5px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  white-space:pre-wrap;line-height:1.4;
}

/* Todo quick view */
.card-todo{
  display:flex;align-items:flex-start;gap:7px;padding:5px 0 2px;
  border-top:1px solid rgba(255,255,255,.05);
}
.todo-ratio{
  font-size:.68rem;font-weight:700;font-family:var(--mono);padding:2px 6px;
  border-radius:4px;white-space:nowrap;flex-shrink:0;
}
.ratio-done{background:rgba(35,204,114,.18);color:#23CC72;border:1px solid rgba(35,204,114,.35)}
.ratio-partial{background:rgba(245,158,11,.14);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.ratio-none{background:rgba(255,255,255,.06);color:var(--txt3);border:1px solid var(--border)}
.card-mini-todos{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden}
.mini-todo{font-size:.7rem;color:var(--txt2);display:flex;align-items:flex-start;gap:4px;line-height:1.3}
.mini-todo.tdone{color:var(--txt3);text-decoration:line-through}
.mini-chk{
  width:10px;height:10px;border:1px solid var(--txt3);border-radius:2px;flex-shrink:0;
  margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:7px;
}
.mini-chk.done{background:var(--success);border-color:var(--success);color:#fff}

/* Card footer */
.card-footer{
  display:flex;align-items:center;justify-content:flex-end;gap:3px;
  padding:.3rem .55rem;border-top:1px solid rgba(255,255,255,.04);
  background:rgba(255,255,255,.015);
}
.card-btn{
  background:none;border:none;color:var(--txt3);cursor:pointer;
  padding:4px 6px;border-radius:5px;font-size:.7rem;
  display:flex;align-items:center;gap:3px;
  transition:background var(--t),color var(--t);
}
.card-btn:hover{background:rgba(255,255,255,.08);color:var(--txt)}
.card-btn.del:hover{background:rgba(239,68,68,.14);color:var(--danger)}

/* Priority border/label classes */
.pc-1{border-left-color:var(--p1)!important} .pl-1{color:var(--p1)!important;border-color:var(--p1)!important}
.pc-2{border-left-color:var(--p2)!important} .pl-2{color:var(--p2)!important;border-color:var(--p2)!important}
.pc-3{border-left-color:var(--p3)!important} .pl-3{color:var(--p3)!important;border-color:var(--p3)!important}
.pc-4{border-left-color:var(--p4)!important} .pl-4{color:var(--p4)!important;border-color:var(--p4)!important}
.pc-5{border-left-color:var(--p5)!important} .pl-5{color:var(--p5)!important;border-color:var(--p5)!important}
.pc-6{border-left-color:var(--p6)!important} .pl-6{color:var(--p6)!important;border-color:var(--p6)!important}
.pc-7{border-left-color:var(--p7)!important} .pl-7{color:var(--p7)!important;border-color:var(--p7)!important}
.pc-8{border-left-color:var(--p8)!important} .pl-8{color:var(--p8)!important;border-color:var(--p8)!important}
.pc-9{border-left-color:var(--p9)!important} .pl-9{color:var(--p9)!important;border-color:var(--p9)!important}
.pc-10{border-left-color:var(--p10)!important} .pl-10{color:var(--p10)!important;border-color:var(--p10)!important}
.pc-C,.pc-c{border-left-color:var(--pc)!important} .pl-C,.pl-c{color:var(--pc)!important;border-color:var(--pc)!important}

/* ── Modals ── */
.modal-overlay{
  position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);backdrop-filter:blur(5px);padding:1rem;overflow-y:auto;
}
.modal-box{
  background:#0f0f14;border:1px solid var(--border2);border-radius:var(--r-xl);
  box-shadow:0 8px 40px rgba(0,0,0,.7);width:100%;max-height:92vh;
  overflow-y:auto;display:flex;flex-direction:column;
  animation:slideUp .18s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.modal-sm{max-width:480px}
.modal-md{max-width:580px}
.modal-lg{max-width:760px}
.modal-xl{max-width:1080px}
.modal-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 1.2rem .7rem;border-bottom:1px solid var(--border);gap:12px;flex-shrink:0;
}
.modal-title{font-size:1rem;font-weight:700;color:var(--txt)}
.modal-x{
  background:none;border:none;color:var(--txt3);cursor:pointer;
  font-size:1.05rem;padding:4px 8px;border-radius:5px;flex-shrink:0;
  transition:background var(--t),color var(--t);
}
.modal-x:hover{background:rgba(239,68,68,.14);color:var(--danger)}
.modal-body{padding:.9rem 1.2rem;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.modal-footer{
  display:flex;align-items:center;justify-content:flex-end;gap:8px;
  padding:.7rem 1.2rem;border-top:1px solid var(--border);flex-shrink:0;
}

/* ── Forms ── */
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.form-grid-2{grid-template-columns:1fr}}
.form-grp{display:flex;flex-direction:column;gap:4px}
.form-lbl{font-size:.72rem;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em}
.req{color:var(--danger)}
.hint-text{font-size:.72rem;color:var(--txt3)}
.hint-text code{font-family:var(--mono);background:rgba(255,255,255,.07);padding:0 3px;border-radius:3px}
.form-ctrl{
  background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--r);
  color:var(--txt);font-size:.85rem;font-family:var(--sans);
  padding:.42rem .6rem;outline:none;resize:vertical;width:100%;
  transition:border-color var(--t),background var(--t);
}
.form-ctrl:focus{border-color:var(--primary);background:rgba(59,130,246,.06)}
.form-ctrl::placeholder{color:var(--txt3)}
select.form-ctrl{cursor:pointer;appearance:none;-webkit-appearance:none}
.mono-input{font-family:var(--mono);font-size:.78rem;line-height:1.5}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:.42rem .85rem;border-radius:var(--r);font-size:.8rem;font-weight:500;
  font-family:var(--sans);cursor:pointer;border:1px solid transparent;
  transition:background var(--t),opacity var(--t);white-space:nowrap;
}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover:not(:disabled){background:var(--primary-d)}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--txt);border-color:var(--border2)}
.btn-secondary:hover:not(:disabled){background:rgba(255,255,255,.13)}
.btn-ghost{background:none;color:var(--txt2);border-color:var(--border)}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.06);color:var(--txt)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626}
.btn-sm{padding:.28rem .55rem;font-size:.75rem}

/* ── Detail modal ── */
.detail-hdr{align-items:flex-start}
.detail-hdr-info{flex:1;min-width:0}
.detail-name{font-size:1.1rem;font-weight:700;color:var(--txt);margin-bottom:5px}
.detail-hdr-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.priority-pill{font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid;background:rgba(0,0,0,.3)}
.detail-layout{display:flex;gap:0;flex:1;overflow:hidden;min-height:0}
.detail-main{flex:1;min-width:0;overflow-y:auto;padding:.85rem .85rem .85rem 1.2rem;display:flex;flex-direction:column;gap:9px}
.detail-sidebar{width:270px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;padding:.6rem}
@media(max-width:760px){
  .detail-layout{flex-direction:column}
  .detail-sidebar{width:100%;border-left:none;border-top:1px solid var(--border)}
}

/* ── Section cards ── */
.sec-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.sec-hdr{
  display:flex;align-items:center;gap:7px;padding:.45rem .75rem;
  background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);
}
.sec-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.sec-sub{font-size:.67rem;color:var(--txt3);flex:1}
.violin-col{color:#a78bfa}
.problems-col{color:#60a5fa}
.ics-col{color:#22d3ee}
.orders-col{color:#fbbf24}
.todo-col{color:#34d399}
.sec-body{
  padding:.6rem .75rem;font-size:.81rem;color:var(--txt);
  white-space:pre-wrap;line-height:1.6;min-height:36px;
}
.mono-text{font-family:var(--mono);font-size:.76rem}
.mini-btn{
  background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:5px;
  color:var(--txt2);cursor:pointer;padding:2px 7px;font-size:.68rem;font-weight:500;
  font-family:var(--sans);margin-left:auto;
  transition:background var(--t),color var(--t);
}
.mini-btn:hover{background:rgba(255,255,255,.12);color:var(--txt)}

/* ── To-Do ── */
.todo-card{display:flex;flex-direction:column;height:100%}
.todo-prog-wrap{display:flex;align-items:center;gap:5px;flex:1;margin:0 6px}
.todo-pct{font-size:.68rem;font-weight:700;font-family:var(--mono);color:var(--txt2);white-space:nowrap}
.todo-bar-bg{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.todo-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:3px;transition:width .4s ease}
.todo-list{flex:1;overflow-y:auto;padding:.4rem .5rem;display:flex;flex-direction:column;gap:3px}
.todo-item{display:flex;align-items:flex-start;gap:6px;padding:4px 3px;border-radius:5px;transition:background var(--t)}
.todo-item:hover{background:rgba(255,255,255,.04)}
.todo-chk{
  width:15px;height:15px;border:1.5px solid rgba(255,255,255,.3);border-radius:3px;
  flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:transparent;transition:all var(--t);
}
.todo-chk.checked{background:var(--success);border-color:var(--success);color:#fff}
.todo-text{font-size:.79rem;color:var(--txt);flex:1;line-height:1.4;word-break:break-word}
.todo-text.done{color:var(--txt3);text-decoration:line-through}
.todo-plain{font-size:.79rem;color:var(--txt2);padding:3px 0;line-height:1.4;border-left:2px solid rgba(255,255,255,.1);padding-left:6px}
.todo-del{
  background:none;border:none;color:var(--txt3);cursor:pointer;
  padding:2px 4px;border-radius:4px;font-size:.68rem;opacity:0;flex-shrink:0;
  transition:opacity var(--t),background var(--t),color var(--t);
}
.todo-item:hover .todo-del{opacity:1}
.todo-del:hover{color:var(--danger);background:rgba(239,68,68,.1)}
.todo-input-row{display:flex;gap:6px;align-items:center;padding:.45rem .5rem;border-top:1px solid var(--border)}

/* ── Toasts ── */
.toast-container{position:fixed;bottom:1rem;right:1rem;z-index:1000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{
  padding:.55rem .9rem;border-radius:var(--r);font-size:.8rem;font-weight:500;color:#fff;
  max-width:300px;pointer-events:auto;box-shadow:0 4px 16px rgba(0,0,0,.5);
  animation:tIn .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes tIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.t-ok{background:rgba(16,185,129,.9);border:1px solid rgba(16,185,129,.4)}
.t-err{background:rgba(239,68,68,.9);border:1px solid rgba(239,68,68,.4)}
.t-info{background:rgba(59,130,246,.9);border:1px solid rgba(59,130,246,.4)}

/* ── Responsive ── */
@media(max-width:600px){
  .btn-label,.brand-main{display:none}
  .hdr-btn{padding:.38rem .5rem}
}
</style>
